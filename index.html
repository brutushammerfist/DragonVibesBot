<html>
    <script type="text/javascript">
        var webSocket = new WebSocket('ws://70.161.83.122:8765');
        //var bell = new Audio('http://70.161.83.122:8080/bell.mp3');
        
        webSocket.onmessage = function (event) {
            console.log(event.data);
            /*var bellPromise = bell.play();
            if (bellPromise !== null){
                bellPromise.catch(() => { bell.play(); })
            }*/
            if(event.data.startsWith("blacklist")) {
                var words = event.data.slice(10);
                words = words.split(",");
                
                var listDiv = document.getElementById('blacklist');
                var ul=document.createElement('ul');
                for (var i = 0; i < words.length; ++i) {
                    var li = document.createElement('li');
                    li.innerHTML = words[i];
                    ul.appendChild(li);
                }
                listDiv.appendChild(ul);
            }
        };
        webSocket.opopen = function (event) {
            console.log("Hello world!");
        };
    </script>
    <head>
        <title>
            DragonVibesBot Controls
        </title>
    </head>
    <body>
        <h1>DragonVibesBot</h1>
        
        <h2>On/Off</h2>
        <form method="post" target="/toggleOnOff">
            <button type="submit">Toggle On/Off</button>
        </form>
        
        <h2>Blacklisted Words</h2>
        <form method="post">
            Here are the words already currently blacklisted: <br>
            <div id="blacklist"></div>
            Add several words by seperating them by a comma: <br>
            <input type="text" name="blacklistWords"/>
            <input type="submit" value="Submit">
        </form>
        
        <h2>Commands</h2>
        <form>
            
        </form>
    </body>
